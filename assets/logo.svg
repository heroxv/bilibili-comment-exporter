<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="biliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7299" />
      <stop offset="100%" stop-color="#00aeec" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3.5" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="100" height="100" rx="22" fill="#18191c" />

  <!-- TV Antennae -->
  <path d="M36 24 L46 34 M64 24 L54 34" stroke="url(#biliGrad)" stroke-width="5" stroke-linecap="round" />
  <circle cx="36" cy="24" r="3" fill="#fb7299" />
  <circle cx="64" cy="24" r="3" fill="#00aeec" />

  <!-- Main TV Body -->
  <rect x="18" y="32" width="64" height="48" rx="12" fill="none" stroke="url(#biliGrad)" stroke-width="5.5" filter="url(#shadow)" />
  
  <!-- TV Screen -->
  <rect x="23.5" y="37.5" width="53" height="37" rx="8" fill="#202226" />

  <!-- Speech Bubble inside Screen (representing comments) -->
  <path d="M33 46 h22 c2 0 4 1.5 4 3.5 v9 c0 2 -2 3.5 -4 3.5 h-4 l-5 4 v-4 h-9 c-2 0 -4 -1.5 -4 -3.5 v-9 c0 -2 2 -3.5 4 -3.5 z" fill="#18191c" stroke="url(#biliGrad)" stroke-width="2" stroke-linejoin="round" />

  <!-- Download Arrow overlaying the right side of the screen -->
  <g stroke="url(#biliGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="66" y1="46" x2="66" y2="64" />
    <polyline points="60 58 66 64 72 58" />
  </g>
</svg>
